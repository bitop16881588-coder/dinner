<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐統計表</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding-bottom: 100px; }
        h2 { text-align: center; color: #005088; }
        .input-group { margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .menu-section { border-top: 1px solid #eee; padding-top: 15px; }
        .food-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #f9f9f9; }
        .food-info { flex: 1; }
        .food-name { font-weight: 500; font-size: 16px; }
        .food-price { color: #888; font-size: 14px; }
        .stepper { display: flex; align-items: center; }
        .stepper button { background: #005088; color: white; border: none; width: 30px; height: 30px; border-radius: 15px; cursor: pointer; font-size: 18px; }
        .stepper input { width: 40px; text-align: center; border: none; font-size: 16px; background: transparent; }
        #summary-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        #submit-btn { background: #11caa0; color: white; border: none; padding: 10px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍲 點餐統計表</h2>
    
    <div class="input-group">
        <label>您的姓名：</label>
        <input type="text" id="user-name" placeholder="請輸入姓名">
    </div>

    <div class="menu-section" id="menu-list">
        </div>
</div>

<div id="summary-bar">
    <div>總計金額：$<span id="total-price">0</span></div>
    <button id="submit-btn" onclick="submitOrder()">確認下單並提交</button>
</div>

<script>
    // 這裡替換為您之前部署的 Google 網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzs7lmm2_bW40laYkVB3fIu9-qwXz9o4He-n9iXbMZSrj78jPiyOYLQ1nnxXkZewAyI1Q/exec";

    // 根據您的照片 完整錄入的菜單
    const menu = [
        { name: "牛骨湯底+牛肉一份", price: 450 },
        { name: "鴛鴦鍋 (牛肉、豬肉)", price: 650 },
        { name: "蔬菜湯底+豬肉一份", price: 300 },
        { name: "牛肉盤", price: 300 },
        { name: "豬肉盤", price: 150 },
        { name: "牛腩肉角盤", price: 250 },
        { name: "牛腩肉筋盤", price: 250 },
        { name: "牛肉湯", price: 130 },
        { name: "牛牛飯", price: 40 },
        { name: "白飯", price: 15 },
        { name: "自助菜盤-大", price: 100 },
        { name: "自助菜盤-中", price: 60 },
        { name: "蔥爆牛/蔥爆肚", price: 180 },
        { name: "沙茶牛/沙茶肚", price: 180 },
        { name: "沙茶肝/沙茶髓", price: 180 },
        { name: "麻油心/麻油肝", price: 200 },
        { name: "麻油牛/麻油麵", price: 200 },
        { name: "清炒時蔬", price: 60 },
        { name: "台啤", price: 60 },
        { name: "金牌/小海", price: 70 },
        { name: "海尼根/百威", price: 100 },
        { name: "汽水/礦泉水", price: 40 },
        { name: "茶類/果汁", price: 60 },
        { name: "石蓮花", price: 100 }
    ];

    let selections = {};

    const list = document.getElementById('menu-list');
    menu.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'food-item';
        div.innerHTML = `
            <div class="food-info">
                <div class="food-name">${item.name}</div>
                <div class="food-price">$${item.price}</div>
            </div>
            <div class="stepper">
                <button onclick="change(${index}, -1)">-</button>
                <input type="number" id="qty-${index}" value="0" readonly>
                <button onclick="change(${index}, 1)">+</button>
            </div>
        `;
        list.appendChild(div);
    });

    function change(index, delta) {
        let current = selections[index] || 0;
        current = Math.max(0, current + delta);
        selections[index] = current;
        document.getElementById(`qty-${index}`).value = current;
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        for (let i in selections) {
            total += selections[i] * menu[i].price;
        }
        document.getElementById('total-price').innerText = total;
    }

    async function submitOrder() {
        const name = document.getElementById('user-name').value.trim();
        if (!name) return alert("請輸入您的姓名！");
        
        let details = "";
        let total = 0;
        for (let i in selections) {
            if (selections[i] > 0) {
                details += `${menu[i].name}x${selections[i]} `;
                total += selections[i] * menu[i].price;
            }
        }
        if (total === 0) return alert("請至少選擇一項餐點！");

        const btn = document.getElementById('submit-btn');
        btn.innerText = "提交中...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({name, details, total})
            });
            alert("提交成功！");
            location.reload();
        } catch (e) {
            alert("提交失敗，請重試");
            btn.disabled = false;
            btn.innerText = "確認下單並提交";
        }
    }
</script>

</body>
</html>
