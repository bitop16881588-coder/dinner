<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚餐點餐統計</title>
    <style>
        /* 奶油風核心配色 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7f3ed; color: #5c4e46; padding: 0; margin: 0; }
        
        /* 頂部導覽列：奶茶色 */
        .tabs { display: flex; background: #ede4da; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 10px rgba(92, 78, 70, 0.05); }
        .tab { flex: 1; text-align: center; padding: 16px 0; color: #8a766a; font-weight: bold; cursor: pointer; opacity: 0.7; font-size: 15px; transition: all 0.3s; }
        .tab.active { opacity: 1; color: #4a3e37; border-bottom: 4px solid #a3b19b; background: rgba(255,255,255,0.4); }
        
        .container { max-width: 500px; margin: auto; padding: 20px; padding-bottom: 150px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* 輸入框區塊：溫柔奶白色 */
        .input-group { margin-bottom: 16px; background: #ffffff; padding: 16px; border-radius: 16px; box-shadow: 0 4px 12px rgba(92, 78, 70, 0.03); border: 1px solid #f1eae1; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #6d5c52; font-size: 15px; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #e3dacd; border-radius: 12px; box-sizing: border-box; font-size: 16px; color: #5c4e46; background-color: #faf8f5; transition: all 0.3s; }
        input[type="text"]:focus, select:focus { outline: none; border-color: #a3b19b; background-color: #ffffff; }
        
        /* 類別標題：淡淡燕麥色 */
        .category-title { background: #f0e8dd; color: #6d5c52; padding: 8px 14px; border-radius: 10px; font-weight: bold; margin: 24px 0 12px 0; font-size: 15px; letter-spacing: 1px; }
        
        /* 菜單網格 */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .menu-grid.two-cols { grid-template-columns: 1fr 1fr; }
        
        /* 菜單卡片 */
        .food-card { background: #ffffff; padding: 14px; border-radius: 16px; box-shadow: 0 4px 12px rgba(92, 78, 70, 0.03); display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1eae1; }
        .food-name { font-weight: 600; font-size: 15px; color: #4a3e37; }
        .food-price { color: #a8968a; font-size: 13px; margin-top: 4px; font-weight: bold; }
        
        /* 加減按鈕：莫蘭迪鼠尾草綠 */
        .stepper { display: flex; align-items: center; }
        .stepper button { background: #a3b19b; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .stepper button:active { background: #8f9e87; }
        .stepper input { width: 32px; text-align: center; border: none; font-size: 16px; color: #4a3e37; font-weight: bold; background: transparent; }
        
        /* 統計明細卡片 */
        .record-card { background: #ffffff; padding: 16px; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(92, 78, 70, 0.03); border: 1px solid #f1eae1; }
        .record-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #f5efe6; padding-bottom: 10px; margin-bottom: 10px; color: #5c4e46; font-size: 15px; }
        
        /* 桌總計卡片：淡淡綠色點綴 */
        .table-total-card { background: #eff2ee; padding: 14px 16px; border-radius: 14px; margin-bottom: 24px; border: 1px dashed #c2cbd0; display: flex; justify-content: space-between; font-weight: bold; color: #52624c; font-size: 16px; }
        
        /* 底部結帳欄 */
        #footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding: 16px 20px; border-top: 1px solid #eee5da; text-align: center; box-shadow: 0 -4px 20px rgba(92, 78, 70, 0.05); }
        #submit-btn { background: #a3b19b; color: white; border: none; padding: 14px; border-radius: 14px; font-weight: bold; font-size: 18px; width: 100%; cursor: pointer; box-shadow: 0 4px 12px rgba(163, 177, 155, 0.3); transition: background 0.2s; }
        #submit-btn:active { background: #8f9e87; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchPage('page-menu', this)">🍲 我要點餐</div>
    <div class="tab" onclick="switchPage('page-records', this); fetchRecords();">📊 點餐內容匯總</div>
</div>

<div class="container">
    <div id="page-menu" class="page active">
        <div class="input-group">
            <label>桌號 (必選)</label>
            <select id="table-num">
                <option value="">-- 請選擇桌號 --</option>
                <option value="1號桌">1號桌</option><option value="2號桌">2號桌</option><option value="3號桌">3號桌</option>
                <option value="4號桌">4號桌</option><option value="5號桌">5號桌</option><option value="6號桌">6號桌</option>
                <option value="7號桌">7號桌</option><option value="8號桌">8號桌</option><option value="9號桌">9號桌</option>
                <option value="10號桌">10號桌</option>
            </select>
        </div>
        <div class="input-group">
            <label>您的姓名</label>
            <input type="text" id="user-name" placeholder="請輸入姓名">
        </div>
        
        <div id="menu-container"></div>

        <div id="footer">
            <div style="margin-bottom:12px; font-size:18px; font-weight:bold; color: #4a3e37;">您的總計：<span style="color: #c97a63;">$</span><span id="total-price" style="color: #c97a63;">0</span></div>
            <button id="submit-btn" onclick="submitOrder()">確認下單並提交</button>
        </div>
    </div>

    <div id="page-records" class="page">
        <h3 style="margin-top:0; color:#4a3e37; font-size: 18px; text-align: center;">📋 全場即時點餐明細</h3>
        <div id="loading" style="text-align:center; color:#a8968a; padding:20px;">餐點搬運中...</div>
        <div id="records-list"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzs7lmm2_bW40laYkVB3fIu9-qwXz9o4He-n9iXbMZSrj78jPiyOYLQ1nnxXkZewAyI1Q/exec";

    const menuData = [
        { category: "✨ 主食湯底與肉盤", cols: 1, items: [
            { name: "牛骨湯底+牛肉一份", price: 450 }, { name: "鴛鴦鍋 (牛肉、豬肉)", price: 650 },
            { name: "蔬菜湯底+豬肉一份", price: 300 }, { name: "牛肉盤", price: 300 },
            { name: "豬肉盤", price: 150 }, { name: "牛腩肉角盤", price: 250 },
            { name: "牛腩肉筋盤", price: 250 }, { name: "牛肉湯", price: 130 },
            { name: "牛牛飯", price: 40 }, { name: "白飯", price: 15 },
            { name: "自助菜盤-大", price: 100 }, { name: "自助菜盤-中", price: 60 }
        ]},
        { category: "🔥 熱炒料理", cols: 2, items: [
            { name: "蔥爆牛", price: 180 }, { name: "蔥爆肚", price: 180 },
            { name: "沙茶牛", price: 180 }, { name: "沙茶肚", price: 180 },
            { name: "沙茶肝", price: 180 }, { name: "沙茶髓", price: 180 }
        ]},
        { category: "🍳 麻油料理", cols: 2, items: [
            { name: "麻油心", price: 200 }, { name: "麻油肝", price: 200 },
            { name: "麻油牛", price: 200 }, { name: "麻油麵", price: 200 }
        ]},
        { category: "🥤 時蔬與水酒", cols: 1, items: [
            { name: "清炒時蔬", price: 60 }, { name: "台啤", price: 60 },
            { name: "金牌、小海", price: 70 }, { name: "海尼根、百威", price: 100 },
            { name: "汽水、礦泉水", price: 40 }, { name: "茶類、果汁", price: 60 },
            { name: "石蓮花", price: 100 }
        ]}
    ];

    let selections = {};
    let flatMenu = [];
    const menuContainer = document.getElementById('menu-container');
    let globalIndex = 0;

    menuData.forEach(cat => {
        const titleDiv = document.createElement('div');
        titleDiv.className = 'category-title';
        titleDiv.innerText = cat.category;
        menuContainer.appendChild(titleDiv);

        const gridDiv = document.createElement('div');
        gridDiv.className = 'menu-grid' + (cat.cols === 2 ? ' two-cols' : '');

        cat.items.forEach(item => {
            flatMenu.push(item);
            const currentIdx = globalIndex;
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = '<div><div class="food-name">' + item.name + '</div><div class="food-price">$' + item.price + '</div></div><div class="stepper"><button onclick="change(' + currentIdx + ',-1)">-</button><input type="number" id="qty-' + currentIdx + '" value="0" readonly><button onclick="change(' + currentIdx + ',1)">+</button></div>';
            gridDiv.appendChild(card);
            globalIndex++;
        });
        menuContainer.appendChild(gridDiv);
    });

    window.switchPage = function(pageId, tabElement) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).style.display = 'block';
        tabElement.classList.add('active');
    };

    window.change = function(index, delta) {
        let current = selections[index] || 0;
        current = Math.max(0, current + delta);
        selections[index] = current;
        document.getElementById('qty-' + index).value = current;
        updateTotal();
    };

    function updateTotal() {
        let total = 0;
        for (let i in selections) { total += selections[i] * flatMenu[i].price; }
        document.getElementById('total-price').innerText = total;
    }

    async function submitOrder() {
        const name = document.getElementById('user-name').value.trim();
        const table = document.getElementById('table-num').value;
        if (!table || !name) return alert("請輸入姓名並選擇桌號！");
        
        let details = "";
        let total = 0;
        for (let i in selections) {
            if (selections[i] > 0) {
                details += flatMenu[i].name + "x" + selections[i] + " ";
                total += selections[i] * flatMenu[i].price;
            }
        }
        if (total === 0) return alert("請先選餐！");

        const btn = document.getElementById('submit-btn');
        btn.innerText = "提交中..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: name, table: table, details: details, total: total }) });
            alert("提交成功！"); location.reload();
        } catch (e) {
            alert("提交失敗"); btn.disabled = false; btn.innerText = "確認下單並提交";
        }
    }

    async function fetchRecords() {
        const listDiv = document.getElementById('records-list');
        const loadingDiv = document.getElementById('loading');
        loadingDiv.style.display = "block"; listDiv.innerHTML = "";

        try {
            const response = await fetch(SCRIPT_URL + "?action=read");
            const data = await response.json();
            loadingDiv.style.display = "none";
            if(!data || data.length === 0) { listDiv.innerHTML = "<div style='text-align:center;color:#a8968a;'>目前還沒有人點餐喔！</div>"; return; }

            data.sort((a, b) => (parseInt(a.table) || 0) - (parseInt(b.table) || 0));
            let currentTable = "", tableTotal = 0, htmlHTML = "";

            data.forEach((r, idx) => {
                if (currentTable !== "" && currentTable !== r.table) {
                    htmlHTML += '<div class="table-total-card"><span>🍵 ' + currentTable + ' 總計</span><span>$' + tableTotal + '</span></div>';
                    tableTotal = 0;
                }
                currentTable = r.table; tableTotal += parseInt(r.total) || 0;
                htmlHTML += '<div class="record-card"><div class="record-header"><span>' + r.table + ' - ' + r.name + '</span><span style="color:#c97a63;">$' + r.total + '</span></div><div style="font-size:14px;color:#7a6b62;line-height:1.4;">' + r.details + '</div></div>';
                if (idx === data.length - 1) {
                    htmlHTML += '<div class="table-total-card"><span>🍵 ' + currentTable + ' 總計</span><span>$' + tableTotal + '</span></div>';
                }
            });
            listDiv.innerHTML = htmlHTML;
        } catch (e) {
            loadingDiv.style.display = "none";
            listDiv.innerHTML = "<div style='text-align:center;color:#c97a63;'>無法讀取匯總</div>";
        }
    }
</script>
</body>
</html>
